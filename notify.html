<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>忘れ物を見つけました</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- reCAPTCHA API -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --border: #d2d2d7;
            --error-bg: #fff0f0;
            --error-text: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.85rem;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            resize: vertical;
            min-height: 120px;
            font-size: 1rem;
            font-family: inherit;
            background-color: #fafafa;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 1.2rem;
            background-color: #f5f5f7;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: var(--primary);
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 113, 227, 0.2);
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #d2d2d7;
            cursor: not-allowed;
            box-shadow: none;
        }

        .error-message {
            color: var(--error-text);
            background-color: var(--error-bg);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
            font-weight: 500;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-weight: 600;
            color: var(--primary);
        }

        .container.is-loading .loading-overlay {
            opacity: 1;
            pointer-events: all;
        }

        #form-section {
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container" id="main-container">
        <div class="loading-overlay" id="loading-txt">送信中...</div>
        <h1>Return QR</h1>
        <p class="subtitle">持ち主にメッセージとお知らせを送信できます。</p>

        <div id="error-box" class="error-message"></div>

        <div id="form-section">
            <div class="form-group">
                <label for="message">メッセージ</label>
                <textarea id="message" placeholder="例: 〇〇の場所に、水筒が落ちていました。" required></textarea>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="send-location" checked>
                <label for="send-location">位置情報を含めて送信する</label>
            </div>

            <div class="form-group" style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                <div class="g-recaptcha" data-sitekey="6LfPkZUsAAAAALxPkYo0nQZSPFXrDrP3LjpRnTyx"></div>
            </div>

            <button id="btn-submit" onclick="handleSubmit()">持ち主に送信する</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://inzjfyxgjbrxvtpzpqgc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluempmeXhnamJyeHZ0cHpwcWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODkzMTAsImV4cCI6MjA4OTc2NTMxMH0.MHvz-nxpfdSkvJd8zexyHSvT_o8Us7F9DRr13_5awLo';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        const errorBox = document.getElementById('error-box');
        const submitBtn = document.getElementById('btn-submit');
        const mainContainer = document.getElementById('main-container');

        if (!uid) {
            showError('URLが不正です。アクセス元のQRコードをお確かめください。');
            submitBtn.disabled = true;
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                mainContainer.classList.add('is-loading');
                submitBtn.disabled = true;
            } else {
                mainContainer.classList.remove('is-loading');
                submitBtn.disabled = false;
            }
        }

        async function getTargetEmail(userId) {
            const { data, error } = await supabaseClient
                .from('users')
                .select('email')
                .eq('user_id', userId)
                .single();

            if (error || !data) {
                console.error('Email fetch error:', error);
                throw new Error('持ち主の情報の取得に失敗しました。');
            }
            return data.email;
        }

        function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('お使いのブラウザは位置情報に対応していません。'));
                } else {
                    navigator.geolocation.getCurrentPosition(
                        (position) => resolve(position.coords),
                        (error) => reject(error),
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                }
            });
        }

        async function handleSubmit() {
            if (!uid) return;
            errorBox.style.display = 'none';

            const message = document.getElementById('message').value;
            const recaptchaResponse = grecaptcha.getResponse();

            if (!message.trim()) {
                showError('メッセージを入力してください。');
                return;
            }
            
            if (recaptchaResponse.length === 0) {
                showError('reCAPTCHA（チェックボックス）を確認してください。');
                return;
            }

            const sendLocation = document.getElementById('send-location').checked;

            setLoading(true);

            try {
                const targetEmail = await getTargetEmail(uid);

                let locationText = '※ 位置情報は送信されませんでした';
                if (sendLocation) {
                    try {
                        const coords = await getLocation();
                        locationText = `https://www.google.com/maps?q=${coords.latitude},${coords.longitude}`;
                    } catch (locErr) {
                        alert('位置情報の取得に失敗したため、位置情報なしで送信します。\n(' + locErr.message + ')');
                        locationText = '※ 位置情報の取得に失敗しました';
                    }
                }

                const { data, error: funcError } = await supabaseClient.functions.invoke('dynamic-responder', {
                    body: {
                        to_email: targetEmail,
                        message: message,
                        location: locationText
                    }
                });

                if (funcError) throw funcError;

                alert('持ち主にメッセージを送信しました！\nご協力ありがとうございます。');
                document.getElementById('message').value = '';

            } catch (error) {
                console.error("送信エラー:", error);
                const errorMsg = error.text || error.message || JSON.stringify(error) || "不明なエラー";
                showError('エラーが発生しました: ' + errorMsg);
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>

</html>
